<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema OS Mecânica</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/logo-192.png">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Sistema Mecânica">
    <link rel="apple-touch-icon" href="img/logo-192.png">

</head>

<body>

    <div class="container">

        <div class="cabecalho">

            <div class="logo-area">
                <img src="img/logo-saul-cortada.JPG" class="logo-oficina">

                <div>
                    <h1>Oficina Sempre 80km/h</h1>
                    <p>Sistema de Ordem de Serviço</p>
                </div>
            </div>

            <div class="os-info">
                <p><strong>OS Nº:</strong> <span id="numeroOS"></span></p>
                <p><strong>Data:</strong> <span id="dataAtual"></span></p>
            </div>

        </div>

        <div id="ordemServico" class="ordem">

            <h2>Dados do Cliente</h2>

            <div class="grid">
                <input type="text" id="nome" placeholder="Nome do Cliente">
                <input type="text" id="telefone" placeholder="Telefone">
                <input type="text" id="endereco" placeholder="Endereço">
                <input type="text" id="placa" placeholder="Placa da Moto">
                <input type="number" id="km" placeholder="KM da Moto">
            </div>

            <h2>Serviços</h2>

            <div id="servicos"></div>

            <button id="btnAdd" onclick="adicionarServico()">+ Adicionar Serviço</button>

            <div class="total">
                <h3>Total: R$ <span id="valorTotal">0.00</span></h3>
            </div>

        </div>

        <div class="acoes">
            <button onclick="salvarOS()">Salvar Online</button>
            <button onclick="listarOS()">Ver Histórico</button>
            <button onclick="gerarImagem()">Gerar Imagem</button>
        </div>

    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <script type="module" src="script.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js")
        }
    </script>



    <div id="painelHistorico" class="painel-historico">
        <input type="text" id="buscarOS" placeholder="Buscar por cliente ou placa..." oninput="filtrarOS()">
        <div class="topo-historico">

            <h3>Histórico de Ordens</h3>

            <button onclick="fecharHistorico()" class="btn-fechar">
                Fechar
            </button>

        </div>

        <div id="historicoConteudo"></div>

    </div>

</body>

</html>
